<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visualisasi Candi Tikus - Eksisting</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* === 1. TEMA MAJAPAHIT === */
        :root {
            --royal-gold: #d4af37;
            --majapahit-red: #800000;
            --deep-brown: #2b1d16;
            --soft-cream: #f9f7f2;
        }

        /* === 2. RESET & DASAR === */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; font-family: 'Inter', sans-serif; 
            background-color: var(--deep-brown); /* Latar belakang cokelat gelap */
        }

        /* === 3. IFRAME (PETA 3D) === */
        iframe { 
            width: 100%; height: 100%; border: none; display: block;
            opacity: 0; transition: opacity 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            transform: scale(1.05);
        }
        .iframe-active { opacity: 1; transform: scale(1); }

        /* === 4. LOADER TEMA MAJAPAHIT === */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--deep-brown); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .loader-title {
            font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--royal-gold);
            letter-spacing: 5px; animation: pulseText 2s infinite; text-align: center;
        }
        .loader-sub { 
            color: #ccc; font-size: 0.9rem; margin-top: 15px; 
            letter-spacing: 2px; text-transform: uppercase;
        }
        .loader-line {
            width: 0%; height: 2px; background: var(--royal-gold); margin-top: 20px;
            animation: lineGrow 2s ease-out forwards;
        }

        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes lineGrow { 0% { width: 0; } 100% { width: 150px; } }

        /* === 5. UI LAYER === */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
            padding: 20px;
        }
        .interactive { pointer-events: auto; }

        /* TOMBOL KEMBALI (Kiri Atas) */
        .header-area { position: absolute; top: 20px; left: 20px; }
        
        .btn-back {
            background: rgba(43, 29, 22, 0.85); color: var(--royal-gold);
            padding: 12px 25px; border-radius: 8px; /* Dibuat agak kotak klasik, tidak terlalu bulat */
            text-decoration: none; font-size: 13px; font-weight: 600; font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            display: flex; align-items: center; gap: 10px;
            transition: all 0.3s; backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-back:hover { 
            background: var(--royal-gold); color: var(--deep-brown); transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
        }

        /* PANEL INFO (Kanan Atas) */
        .info-panel {
            position: absolute;
            top: 20px; right: 20px;
            width: 340px;
            
            /* Background Elegan */
            background: rgba(43, 29, 22, 0.9); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-left: 4px solid var(--majapahit-red); /* Aksen Merah Majapahit */
            
            padding: 25px; border-radius: 8px; color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            
            opacity: 0; transform: translateX(50px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 500;
        }
        .info-panel.visible { opacity: 1; transform: translateX(0); }

        .badge-container { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
        .live-dot { 
            width: 8px; height: 8px; background: var(--royal-gold); 
            border-radius: 50%; box-shadow: 0 0 10px var(--royal-gold); 
            animation: pulseDot 1.5s infinite; 
        }
        .badge { 
            font-size: 11px; font-weight: 700; color: var(--royal-gold); 
            letter-spacing: 1px; text-transform: uppercase;
        }
        
        h2 { 
            font-family: 'Cinzel', serif; margin: 0 0 10px 0; 
            font-size: 20px; line-height: 1.3; color: white;
        }
        p { margin: 0; font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.6; }

        @keyframes pulseDot { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* === 6. RESPONSIF HP === */
        @media screen and (max-width: 768px) {
            .header-area { top: 15px; left: 15px; }
            .btn-text { display: none; }
            .btn-back { padding: 10px 15px; }

            .info-panel {
                top: auto; right: auto;
                bottom: 0; left: 0;
                width: 100%; border-radius: 20px 20px 0 0;
                border-left: none; border-top: 4px solid var(--majapahit-red);
                transform: translateY(100%);
                padding-bottom: 30px;
            }
            .info-panel.visible { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-title">Candi Tikus Kering (Cesium Ion)</div>
        <div class="loader-sub">Memuat Data 3D Gaussian Splatting 5k Iterasi...</div>
        <div class="loader-line"></div>
    </div>

    <iframe 
        id="cesiumFrame"
        src="https://ion.cesium.com/stories/viewer/?id=62563bd7-9a12-4b7c-9cf9-e76a7e78d452" 
        allowfullscreen>
    </iframe>

    <div id="ui-layer">
        
        <div class="header-area">
            <a href="index.html" class="btn-back interactive">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                <span class="btn-text">KEMBALI KE BERANDA</span>
            </a>
        </div>
    </div>

    <script>
        window.onload = function() {
            const loader = document.getElementById('loader');
            const frame = document.getElementById('cesiumFrame');
            const infoPanel = document.getElementById('infoPanel');

            // Simulasi loading agar animasi garis sempat selesai
            setTimeout(() => {
                // 1. Hilangkan Loader
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                
                // 2. Munculkan Iframe dengan efek Zoom Out
                frame.classList.add('iframe-active');
                
                // 3. Munculkan Panel Info
                if(infoPanel) infoPanel.classList.add('visible');
                
            }, 2000); // Diubah menjadi 2 detik agar pas dengan animasi loading line
        };
    </script>

</body>
</html>
